name: 发布到 GitHub Pages

on:
  # 每日分析完成后自动触发
  workflow_run:
    workflows: ["每日股票分析"]
    types:
      - completed
  
  # 也可以手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限
permissions:
  contents: write
  pages: write
  id-token: write

# 只允许一个部署同时进行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 只在分析成功后执行
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 获取完整历史，用于读取所有报告
      
      - name: 下载最新分析报告
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: analysis-reports-${{ github.event.workflow_run.run_number }}
          path: ./latest-reports
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install markdown jinja2 python-dateutil
      
      - name: 生成 GitHub Pages 网站
        run: |
          python scripts/generate_pages.py
      
      - name: 上传到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: 显示部署结果
        run: |
          echo "✅ 网站已部署到: ${{ steps.deployment.outputs.page_url }}"
